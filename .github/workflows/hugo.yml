name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        env:
          # サプライチェーン対策: latest ではなく検証済みバージョンに固定
          HUGO_VERSION: "0.164.0"
        run: |
          wget -q -O hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Clone PaperMod theme
        env:
          # サプライチェーン対策: master 追従ではなく検証済みコミットに固定
          PAPERMOD_COMMIT: "154d006e0182dfc7da38008323976b02e6bfab4a"
        run: |
          git clone https://github.com/adityatelange/hugo-PaperMod themes/PaperMod
          git -C themes/PaperMod checkout --detach "$PAPERMOD_COMMIT"

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

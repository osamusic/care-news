baseURL = "https://yorisoi-news.osamusic.org/"
languageCode = "ja"
title = "Yorisoi Daily"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false

[params]
  author = "osamusic"
  description = "認知症のケア・介護・医療・制度の情報を毎日自動収集してお届けします。"
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  comments = true

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"

  [params.label]
    icon = "icon-64.png"
    iconHeight = 30

  [params.homeInfoParams]
    Title = "Yorisoi Daily — よりそいデイリー"
    Content = "認知症とともに歩むご家族・ケアに携わる方へ。ケアの工夫・新薬や研究・介護保険や制度・サービスの情報を毎日自動収集してお届けします。基礎知識やことばの意味をじっくり知りたいときは、姉妹サイト [Yorisoi Knowledge](https://yorisoi.osamusic.org/) をご覧ください。記事は [note](https://note.com/yorisoi_daily) にも掲載しています。"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[menu]
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    name = "ナレッジ ↗"
    url = "https://yorisoi.osamusic.org/"
    weight = 15
  [[menu.main]]
    name = "note ↗"
    url = "https://note.com/yorisoi_daily"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
